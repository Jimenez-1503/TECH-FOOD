<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Pratos - TECH-FOOD</title>

    <link rel="stylesheet" href="src/styles/global.css">
    <link rel="stylesheet" href="src/styles/style.css">
    <link rel="stylesheet" href="src/styles/cadastro.css">
</head>

<body>

    <header id="topo-loja">
        <h1 id="titulo-site">TechFood - Sabor & Saber</h1>
        <p id="boas-vindas">Cadastro de Novos Pratos</p>

        <input type="checkbox" id="bt_menu">
        <label for="bt_menu" id="label-menu">&#9776;</label>

        <nav id="menu">
            <ul>
                <li><a href="index.html">Cardápio</a></li>
                <li><a href="pedidos.html">Meus Pedidos</a></li>
                <li><a href="cadastro.html">Cadastrar Prato</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="secao-cadastro">
            <h2 class="titulo-secao">Cadastrar Novo Prato</h2>

            <form id="formCadastro">

                <div class="campo">
                    <label for="nome">Nome do prato</label>
                    <input type="text" id="nome" required>
                </div>

                <div class="campo">
                    <label for="descricao">Descrição</label>
                    <textarea id="descricao" rows="4" required></textarea>
                </div>

                <div class="campo">
                    <label for="preco">Preço</label>
                    <input type="number" id="preco" step="0.01" min="0" required>
                </div>

                <div class="campo">
                    <label for="categoria">Categoria</label>
                    <input type="text" id="categoria" required>
                </div>

                <div class="campo">
                    <label for="imagem">URL da Imagem</label>
                    <input type="url" id="imagem" required>
                </div>

                <button type="submit" id="btn-cadastrar">
                    Cadastrar Produto
                </button>

            </form>

            <p id="mensagem"></p>
        </section>
    </main>

    <footer id="rodape">
        <div class="info-footer">
            <p><strong>TechFood 2026</strong></p>
            <p>Escola SENAI Ítalo Bologna - Itu/SP</p>
            <p>Av. das Nações, 1500</p>
        </div>
        <p id="data-hora-footer"></p>
    </footer>

    <script src="src/scripts-sala.js/global.js"></script>
    <script src="src/scripts/cadastro.js"></script>

</body>
</html>
